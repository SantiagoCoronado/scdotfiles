# Key layout adapted from https://github.com/omerxx/dotfiles/tree/master/tmux
# unbind-key -a

bind ^X lock-server
bind ^C new-window -c "$HOME"
bind ^D detach

bind H previous-window
bind L next-window

bind r command-prompt "rename-window %%"
bind R source-file ~/.config/tmux/tmux.conf
bind ^A last-window
bind ^W list-windows
bind w list-windows
bind z resize-pane -Z
bind ^L refresh-client
bind l refresh-client
bind | split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind '"' choose-window
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# Resize panes with Ctrl + vim keys (repeatable - press prefix once, then hold Ctrl and tap h/j/k/l)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Resize panes with Shift + arrows (repeatable)
bind -r S-Left resize-pane -L 5
bind -r S-Down resize-pane -D 5
bind -r S-Up resize-pane -U 5
bind -r S-Right resize-pane -R 5
bind : command-prompt
bind * setw synchronize-panes
bind P set pane-border-status
bind c kill-pane
bind x swap-pane -D
bind S choose-session

# Session management (kill/cleanup)
bind X confirm-before -p "Kill session #S? (y/n)" kill-session
bind Q run-shell "tmux list-sessions | fzf --reverse | cut -d: -f1 | xargs -I {} tmux kill-session -t {}"
bind M-x kill-session -a  # Kill all OTHER sessions

bind K send-keys "clear"\; send-keys "Enter"
bind-key -T copy-mode-vi v send-keys -X begin-selection
