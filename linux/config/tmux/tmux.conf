# Inspired by https://github.com/omerxx/dotfiles/tree/master/tmux with local tweaks
source-file ~/.config/tmux/tmux.reset.conf

# Core behaviour
set -g prefix C-a
unbind C-b
bind C-a send-prefix
set-option -g default-terminal 'tmux-256color'
set-option -ga terminal-overrides ',xterm-256color:RGB'
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins"
set -g base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g renumber-windows on
set -g set-clipboard on
set -g status-position bottom
setw -g mode-keys vi
set -g pane-active-border-style 'fg=white,bg=default'
set -g pane-border-style 'fg=colour238,bg=default'
set -g status-left-length 40
set -g status-right-length 80
set -g status-interval 5

# Additional navigation helpers
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Plugin configuration
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="> " --border-label="[URL]"'
set -g @fzf-url-history-limit '2000'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'laktak/extrakto'

set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'white'
set -g @floax-text-color 'white'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'

# Extrakto - fuzzy find text from scrollback
set -g @extrakto_key 'Tab'
set -g @extrakto_split_size '12'
set -g @extrakto_clip_tool 'xclip -selection clipboard'
set -g @extrakto_fzf_tool 'fzf'
set -g @extrakto_popup_size '60%'

set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-custom-paths '~/dotfiles'
set -g @sessionx-bind 'o'
set -g @sessionx-x-path '~/dotfiles'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'

set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# ── BRUTALIST THEME (monochrome) ─────────────────────────
set -g status-style 'bg=black,fg=white'
set -g status-left '#{?client_prefix,#[fg=black]#[bg=white]#[bold] PREFIX ,#[fg=black]#[bg=white]#[bold] #S }#[default] '
set -g status-right '#[fg=colour250]#{b:pane_current_path} | %H:%M '
set -g window-status-separator '#[fg=colour245]|'
set -g window-status-format '#[fg=colour250] #I:#W '
set -g window-status-current-format '#[fg=black,bg=white,bold] #I:#W#{?window_zoomed_flag,[Z],} '
set -g message-style 'fg=black,bg=white,bold'
set -g message-command-style 'fg=white,bg=black'
set -g mode-style 'fg=black,bg=white'
set -g clock-mode-colour white
set -g window-status-bell-style 'fg=black,bg=white,bold'
set -g window-status-activity-style 'fg=white,bg=black,underscore'
set -g display-panes-active-colour white
set -g display-panes-colour colour245

run '~/.tmux/plugins/tpm/tpm'
